[tool.poetry]
name = "python-project-template"
version = "0.1.0"
description = "Python project template repository"
authors = ["scotthorban <161889944+scotthorban@users.noreply.github.com>"]
readme = "README.md"

[tool.poetry.dependencies]
python = "^3.11"

[tool.poetry.group.dev.dependencies]
taskipy = "^1.12.2"
pre-commit = "^3.6.0"
detect-secrets = "^1.4.0"
pytest = "^8.0.0"
pytest-cov = "^4.1.0"
pylint = "^3.0.3"
typing-extensions = "^4.10.0"
isort = "^5.13.2"
tox = "^4.12.1"
anybadge = "^1.14.0"

[[tool.poetry.source]]
name = "PyPI"
priority = "primary"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[tool.taskipy.tasks]
install_hooks = { cmd = """
chmod u+x .git/hooks/*
pre-commit install
pre-commit install --hook-type commit-msg""", help = "Install all pre-commit hooks stored in .git-hooks" }

detect_secrets_scan = { cmd = "detect-secrets scan --baseline .secrets.baseline.json", help = """Updates the .secrets.baseline.json file with any newly detected secrets"""}
audit_secrets = { cmd = "detect-secrets audit .secrets.baseline.json", help = """Runs a command line tool to allow the user to manually flag detected secrets as false positives"""}
