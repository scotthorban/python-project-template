name: Generate Git Tag and GitHub Release

on:
  workflow_run:
    workflows: [ "Run CI via uv" ]
    types:
      - completed
  workflow_dispatch:

jobs:
  tag-and-release:
    if: >
      (github.event_name == 'workflow_dispatch') ||
      (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}
          token: ${{ secrets.PAT }}
      - name: Extract version from pyproject.toml
        id: get_version
        run: |
          VERSION=$(grep -E '^version\s*=' pyproject.toml | head -n 1 | cut -d '"' -f 2)
          if [ -z "$VERSION" ]; then
            echo "❌ Could not find version in pyproject.toml"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Create git tag
        run: |
          git config --global user.email "scott-horban@users.noreply.github.com"
          git config --global user.name "scott-horban"
          git tag -a "v${{ steps.get_version.outputs.version }}" -m "Release v${{ steps.get_version.outputs.version }}"
          git push origin "v${{ steps.get_version.outputs.version }}"
      - name: Create GitHub release
        uses: actions/create-release@v1
        with:
          tag_name: v${{ steps.get_version.outputs.version }}
          release_name: v${{ steps.get_version.outputs.version }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
