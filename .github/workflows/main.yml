name: Run CI via tox

on: pull_request

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      #----------------------------------------------
      #       check-out repo and set-up python
      #----------------------------------------------
      - name: Check out repository
        uses: actions/checkout@v4        
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.PAT }}
      - name: Set up python
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      #----------------------------------------------
      #  -----  install & configure poetry  -----
      #----------------------------------------------
      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true
          installer-parallel: true

      #----------------------------------------------
      #       load cached venv if cache exists
      #----------------------------------------------
      - name: Load cached venv
        id: cached-poetry-dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('**/poetry.lock') }}
      #----------------------------------------------
      # install dependencies if cache does not exist
      #----------------------------------------------
      - name: Install dependencies
        if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
        run: poetry install --no-interaction --all-extras --with dev --no-root
      #----------------------------------------------
      #       run test suite & regenerate badges
      #----------------------------------------------
      - name: Run tests & update project badges
        run: |
          git config --global user.email "scott-horban@users.noreply.github.com"
          git config --global user.name "scott-horban"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/$GITHUB_REPOSITORY
          CURRENT_BRANCH=$(git rev-parse --abbrev-ref HEAD)
          source .venv/bin/activate
          tox run
          if git status | grep -q modified; then
            echo "Committing updated project badges to ${CURRENT_BRANCH}"
            git add docs/img/
            git commit -m "chore: refresh project badges [skip ci]"
            git push
            echo "Changes committed to ${CURRENT_BRANCH} successfully! Exiting."
          else
            echo "No updates required to project badges! Exiting pipeline successfully."
          fi
